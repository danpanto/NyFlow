<!DOCTYPE html>
<html>
    <head>
        <title>NYflow</title>
        <link rel="stylesheet" href="/static/css/styles.css">
        <link rel="stylesheet" href="/static/css/leaflet.css">
        <link rel="stylesheet" href="/static/css/leaflet-routing-machine.css">
        <script src="/static/js/leaflet.js"></script>
        <script src="/static/js/leaflet-routing-machine.js"></script>
        <script type="module" src="/static/js/main.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    </head>
    <body>
        <div id="map-view"></div>
        <div class="title-container"> <img src="/static/img/logo.webp" class="title-logo" alt="Logo" />
            <span class="title-text">NyFlow</span>
            <span class="layer-title-text"></span> </div>
        </div>
        <theme-btn></theme-btn>
        <bottom-drawer title="Layers">
            <layer-selector selected="neighbourhoods">
                <button layer="neighbourhoods">Neighbourhoods</button>

                <button layer="routes">Optimal Routes</button>

                <button layer="total_price"></button>
                <button layer="total_tip"></button>

                <button layer="total_trips"></button>
                <button layer="mean_price"></button>
                <button layer="mean_tip"></button>

                <button layer="mean_duration"></button>
                <button layer="mean_price_time"></button>
                <button layer="mean_tip_time"></button>

                <button layer="mean_distance"></button>
                <button layer="mean_price_dis"></button>
                <button layer="mean_tip_dis"></button>
            </layer-selector>
        </bottom-drawer>
    </body>
</html>
